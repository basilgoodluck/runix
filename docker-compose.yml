services:

  runix:
    build:
      context: .
      dockerfile: docker/engine/Dockerfile
    container_name: runix
    restart: unless-stopped
    ports:
      - "2345:2345"
    environment:
      NODE_ENV: development
      PORT: 2345
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_KEY: ${API_KEY}
      TLS_ENABLED: ${TLS_ENABLED:-false}
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - runix-internal
    security_opt:
      - no-new-privileges:true
  
  db:
    image: postgres:16
    container_name: runix-db
    restart: always
    environment:
      POSTGRES_USER: runix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: runix
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - runix-internal

  redis:
    image: redis:7-alpine
    container_name: runix-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save ""
      --appendonly no
    volumes:
      - redis-data:/data
    networks:
      - runix-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

networks:
  runix-internal:
    driver: bridge

volumes:
  redis-data:
  pgdata: